<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demon Slayer — DDL — Compressé — Chromatique</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e1117; --bg2: #161b27; --card: #1c2333; --border: #2a3347; --text: #e8eaf0; --muted: #6b7a99; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .rainbow-bar { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #e8453c, #f5a623, #f5e623, #4ecb8d, #3c9be8, #7c3ce8); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 480px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: -60px; right: -60px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(232,69,60,0.12) 0%, transparent 70%); pointer-events: none; }
    .header { display: flex; align-items: center; gap: 1rem; }
    .logo { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
    .team-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; background: linear-gradient(135deg, #e8453c, #f5a623, #f5e623); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .manga-cover { width: 100%; height: auto; border-radius: 12px; margin: 1.2rem 0 0; }
    .subtitle { font-size: 0.85rem; color: var(--muted); margin: 1rem 0 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .subtitle::before { content: ''; display: inline-block; width: 20px; height: 2px; background: linear-gradient(90deg, #e8453c, #f5a623); border-radius: 2px; }
    .notice { background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.25); border-radius: 10px; padding: 0.8rem 1rem; font-size: 0.82rem; color: #c9a96e; line-height: 1.5; margin-bottom: 1.2rem; }
    .btn { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1.2rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); text-decoration: none; font-size: 0.95rem; font-weight: 500; margin-bottom: 0.6rem; transition: all 0.2s ease; position: relative; overflow: hidden; }
    .btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(232,69,60,0.08), rgba(245,166,35,0.08)); opacity: 0; transition: opacity 0.2s; }
    .btn:hover { border-color: #f5a623; transform: translateX(4px); }
    .btn:hover::before { opacity: 1; }
    .btn-icon { font-size: 1.1rem; flex-shrink: 0; }
    .btn span:nth-child(2) { flex: 1; }
    .btn-arrow { font-size: 0.8rem; color: var(--muted); flex-shrink: 0; }
    .btn:hover .btn-arrow { color: #f5a623; }
    .soon-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .soon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .soon-text { color: var(--muted); font-size: 0.9rem; }
    .footer { margin-top: 1.5rem; text-align: center; font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="rainbow-bar"></div>
  <div class="card">
    <div class="header">
      <img class="logo" src="https://ugc.production.linktr.ee/3D6PzXg6SgyqsZedeTy7_xtVc39Kh9Vg0nRf5?io=true&size=avatar-v3_0" alt="Chromatique">
      <div><div class="team-name">Chromatique</div></div>
    </div>
    <img class="manga-cover" src="https://cdn.imgchest.com/files/9cbcf8a09c2c.jpg" alt="Demon Slayer">
    <div class="subtitle">DDL — Compressé</div>
    <div class="notice">ℹ️ Les tomes en couleur officiels (par la Shueisha) ne sont sortis qu'à partir du tome 17, c'est pourquoi ils n'existent pas pour les premiers volumes.</div>
    <div class="links"><a class="btn" href="https://mega.nz/folder/RqcBBb4Q#EaTXAVVbcry2wgmgWBLj3A" target="_blank" rel="noopener"><span class="btn-icon">📥</span><span>Tomes 17 à 23</span><span class="btn-arrow">↗</span></a></div>
    <div class="footer">Edition couleur · Team Chromatique</div>
  </div>
</body>
</html>
