<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Torrent Compressé — Chromatique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e1117; --card: #1c2333; --border: #2a3347; --text: #e8eaf0; --muted: #6b7a99; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .rainbow-bar { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #e8453c, #f5a623, #f5e623, #4ecb8d, #3c9be8, #7c3ce8); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 480px; text-align: center; }
    .logo { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 1rem; }
    .team-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; background: linear-gradient(135deg, #e8453c, #f5a623); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .manga-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin: 1rem 0 0.3rem; }
    .soon { font-size: 3rem; margin: 1.5rem 0 0.5rem; }
    p { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="rainbow-bar"></div>
  <div class="card">
    <img class="logo" src="https://ugc.production.linktr.ee/3D6PzXg6SgyqsZedeTy7_xtVc39Kh9Vg0nRf5?io=true&size=avatar-v3_0" alt="Chromatique">
    <div class="team-name">Chromatique</div>
    <div class="manga-title">Dragon Ball Super</div>
    <div class="soon">⏳</div>
    <p>Torrent Compressé<br>Bientôt disponible !</p>
  </div>
</body>
</html>
